name: Sync to Hugging Face Hub

on:     
  workflow_dispatch:       

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    
          lfs: true         

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://USER:$HF_TOKEN@huggingface.co/spaces/Ankit-Singh-ai/DealScout main